<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle radial gradient glow effect for smaller size -->
    <radialGradient id="glowGradientFavicon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a54e;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#c9a54e;stop-opacity:0" />
    </radialGradient>

    <!-- Minimal filter for text glow -->
    <filter id="textGlowFavicon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="16" cy="16" r="16" fill="#0a0a12"/>

  <!-- Glow effect behind character -->
  <circle cx="16" cy="16" r="10" fill="url(#glowGradientFavicon)"/>

  <!-- Gold Chinese character "天" with subtle glow -->
  <text
    x="16"
    y="22"
    font-family="'STHeiti', 'SimHei', 'Microsoft YaHei', sans-serif"
    font-size="20"
    font-weight="bold"
    fill="#c9a54e"
    text-anchor="middle"
    filter="url(#textGlowFavicon)"
  >天</text>
</svg>