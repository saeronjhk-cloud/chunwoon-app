<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial gradient glow effect -->
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a54e;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#c9a54e;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#c9a54e;stop-opacity:0" />
    </radialGradient>

    <!-- Filter for text glow -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="96" cy="96" r="96" fill="#0a0a12"/>

  <!-- Glow effect behind character -->
  <circle cx="96" cy="96" r="60" fill="url(#glowGradient)"/>

  <!-- Gold Chinese character "天" with glow -->
  <text
    x="96"
    y="115"
    font-family="'STHeiti', 'SimHei', 'Microsoft YaHei', sans-serif"
    font-size="100"
    font-weight="bold"
    fill="#c9a54e"
    text-anchor="middle"
    filter="url(#textGlow)"
  >天</text>
</svg>